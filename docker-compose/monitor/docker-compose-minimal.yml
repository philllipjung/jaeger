# Docker Compose - OpenSearch, Dashboards, Jaeger
# Minimal monitoring stack for tracing visualization

services:
  # ========== OPENSEARCH ==========
  opensearch:
    image: opensearchproject/opensearch:3.1.0
    container_name: opensearch
    networks:
      - backend
    environment:
      - discovery.type=single-node
      - bootstrap.memory_lock=true
      - "OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m"
      - "DISABLE_INSTALL_DEMO_CONFIG=true"
      - DISABLE_SECURITY_DASHBOARDS_PLUGIN=true
      - plugins.security.disabled=true
      - http.host=0.0.0.0
      - transport.host=127.0.0.1
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    ports:
      - "9200:9200"
      - "9600:9600"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30
    volumes:
      - esdata:/usr/share/opensearch/data

  # ========== OPENSEARCH DASHBOARDS ==========
  opensearch-dashboards:
    image: opensearchproject/opensearch-dashboards:3.1.0
    container_name: opensearch-dashboards
    networks:
      - backend
    ports:
      - "5601:5601"
    environment:
      OPENSEARCH_HOSTS: '["http://opensearch:9200"]'
      DISABLE_SECURITY_DASHBOARDS_PLUGIN: "true"
    depends_on:
      opensearch:
        condition: service_healthy

  # ========== JAEGER (with OpenSearch backend) ==========
  jaeger:
    image: jaegertracing/jaeger:latest
    container_name: jaeger
    networks:
      - backend
    volumes:
      - ./jaeger-ui.json:/etc/jaeger/jaeger-ui.json
      - ./config-spm-opensearch.yaml:/etc/jaeger/config.yml
    command: ["--config", "/etc/jaeger/config.yml"]
    ports:
      - "16686:16686"  # Jaeger UI
      - "8888:8888"   # Jaeger internal metrics
    depends_on:
      opensearch:
        condition: service_healthy

networks:
  backend:

volumes:
  esdata:
    driver: local
