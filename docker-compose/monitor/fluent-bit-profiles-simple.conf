# Fluent Bit Configuration for eBPF and Java Profiles - Simple JSON export
# Reads profile JSONL files and exports to OpenSearch

[SERVICE]
    Flush         10
    Daemon        Off
    Log_Level     debug
    Parsers_File  parsers.conf

# ========== INPUT: eBPF Profiles ==========
[INPUT]
    Name              tail
    Path              /var/log/otel-collector/profiles/profiles.jsonl
    Parser            json
    Tag               ebpf_profiles
    Refresh_Interval  10
    Skip_Long_Lines   Off
    DB                /tmp/profiles.db
    Mem_Buf_Limit     100MB
    Buffer_Chunk_Size 1MB
    Buffer_Max_Size   5MB

# ========== INPUT: Java Stack Traces ==========
[INPUT]
    Name              tail
    Path              /var/log/otel-collector/profiles-java/stack-traces.jsonl
    Tag               java_stack_traces
    Parser            json
    Refresh_Interval  10
    Skip_Long_Lines   Off
    DB                /tmp/profiles-stack.db
    Mem_Buf_Limit     100MB
    Buffer_Chunk_Size 5MB
    Buffer_Max_Size   10MB

# ========== INPUT: Java Call Trees/Hot Paths ==========
[INPUT]
    Name              tail
    Path              /var/log/otel-collector/profiles-java/call-trees.jsonl
    Tag               java_call_trees
    Parser            json
    Refresh_Interval  10
    Skip_Long_Lines   On
    DB                /tmp/profiles-trees.db
    Mem_Buf_Limit     100MB
    Buffer_Chunk_Size 10MB
    Buffer_Max_Size   10MB

# ========== OUTPUT: eBPF Profiles to OpenSearch ==========
[OUTPUT]
    Name              opensearch
    Match             ebpf_profiles
    Host              opensearch
    Port              9200
    Index             ebpf-profiles
    Trace_Output      On
    Trace_Error       On
    Suppress_Type_Name On
    Log_Level         debug

# ========== OUTPUT: Java Stack Traces to OpenSearch ==========
[OUTPUT]
    Name              opensearch
    Match             java_stack_traces
    Host              opensearch
    Port              9200
    Index             java-stack-traces
    Trace_Output      On
    Trace_Error       On
    Suppress_Type_Name On
    Log_Level         debug

# ========== OUTPUT: Java Call Trees to OpenSearch ==========
[OUTPUT]
    Name              opensearch
    Match             java_call_trees
    Host              opensearch
    Port              9200
    Index             java-call-trees
    Trace_Output      On
    Trace_Error       On
    Suppress_Type_Name On
    Log_Level         debug
