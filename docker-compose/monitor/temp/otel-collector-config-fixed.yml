# OpenTelemetry Collector Configuration - Fixed
# Sends metrics to both Prometheus and OpenSearch

receivers:
  # Host Metrics Receiver - collects system-level metrics
  hostmetrics:
    scrapers:
      cpu:
      disk:
      filesystem:
      load:
      memory:
      network:

  # Docker Stats Receiver - collects container metrics
  docker_stats:
    endpoint: /var/run/docker.sock

  # OTLP receiver for traces, metrics, logs, and profiles
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318
        cors:
          allowed_origins:
            - "http://localhost:4070"
            - "http://localhost:3000"
            - "http://localhost:5173"
            - "*"
          allowed_headers:
            - "*"
          max_age: 7200

processors:
  batch:

  # Resource Detection Processor - detects and adds resource attributes
  resourcedetection:
    detectors: [env, system]
    timeout: 2s
    override: false

  # Memory Limiter - prevents OOM
  memory_limiter:
    check_interval: 1s
    limit_mib: 512
    spike_limit_mib: 128

  filter/exclude_otel_exports:
    traces:
      span:
        - 'attributes["url.full"] != nil and IsMatch(attributes["url.full"], ".*opentelemetry.proto.collector.*")'

  # Resource Processor - add custom resource attributes
  resource/add_cluster:
    attributes:
      - key: cluster.name
        value: "monitoring-stack"
        action: upsert

exporters:
  # ========== PROMETHEUS EXPORTERS ==========

  # Prometheus Remote Write - send metrics to Prometheus
  prometheusremotewrite:
    endpoint: http://prometheus:9090/api/v1/write
    tls:
      insecure: true
    resource_to_telemetry_conversion:
      enabled: true

  # Prometheus Exporter - expose metrics for scraping
  prometheus:
    endpoint: "0.0.0.0:8889"
    resource_to_telemetry_conversion:
      enabled: true

  # ========== OPENSEARCH EXPORTERS ==========

  # Data Prepper Exporter (Metrics)
  otlp/metrics:
    endpoint: data-prepper:21891
    tls:
      insecure: true

  # Data Prepper Exporter (Traces)
  otlp/traces:
    endpoint: data-prepper:21890
    tls:
      insecure: true
      insecure_skip_verify: true

  # ========== DEBUG EXPORTER ==========

  debug:
    verbosity: normal

service:
  telemetry:
    resource:
      service.name: otel-collector
      service.version: 0.131.0
    logs:
      level: info
    metrics:
      level: detailed
      readers:
        - pull:
            exporter:
              prometheus:
                host: 0.0.0.0
                port: 8888

  # Extensions
  extensions:
    - health_check
    - pprof
    - zpages

  # Pipelines
  pipelines:
    # ========== TRACE PIPELINE ==========
    traces:
      receivers: [otlp]
      processors: [batch, memory_limiter, resourcedetection, filter/exclude_otel_exports]
      exporters:
        - otlp/traces       # To Data Prepper → OpenSearch

    # ========== METRICS PIPELINE ==========
    metrics:
      receivers: [hostmetrics, docker_stats, otlp]
      processors: [batch, memory_limiter, resourcedetection, resource/add_cluster]
      exporters:
        - prometheusremotewrite  # To Prometheus (Remote Write)
        - prometheus             # To Prometheus (Scraping)
        - otlp/metrics           # To Data Prepper → OpenSearch

# ========== EXTENSIONS ==========
extensions:
  health_check:
    endpoint: 0.0.0.0:13133
    path: /health
  pprof:
    endpoint: 0.0.0.0:1777
  zpages:
    endpoint: 0.0.0.0:55679
