# Fluent Bit Configuration for eBPF Profiles
# Reads profile JSONL files from OTEL Collector and exports to OpenSearch

[SERVICE]
    Flush         5
    Daemon        Off
    Log_Level     Info
    Parsers_File  parsers.conf

[INPUT]
    Name              tail
    Path              /var/log/otel-collector/profiles/profiles.jsonl
    Parser            json
    Tag               ebpf_profiles
    Refresh_Interval  5
    Skip_Long_Lines   On
    DB                /tmp/profiles.db
    Mem_Buf_Limit     50MB

[FILTER]
    Name                nest
    Match               ebpf_profiles
    Operation           lift
    Nested_under       resourceProfiles
    Add_prefix          resource_

[FILTER]
    Name                nest
    Match               ebpf_profiles
    Operation           lift
    Nested_under       resource_scopeProfiles
    Add_prefix          scope_

[FILTER]
    Name                nest
    Match               ebpf_profiles
    Operation           lift
    Nested_under       scope_profiles
    Add_prefix          profile_

[FILTER]
    Name                lua
    Match               ebpf_profiles
    Script              /fluent-bit/etc/lua_scripts/flatten_profiles.lua
    Call                flatten_profile

[OUTPUT]
    Name              opensearch
    Match             ebpf_profiles
    Host              opensearch
    Port              9200
    Index             ebpf-profiles
    HTTP_User         null
    HTTP_Passwd       null
    Trace_Output      On
    Trace_Error       On
    Suppress_Type_Name On
    ID_Key            _id
    Replace_Dots      On
    Log_Level         Info
