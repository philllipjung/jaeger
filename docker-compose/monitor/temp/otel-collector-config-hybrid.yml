# OpenTelemetry Collector Configuration
# Based on /home/philip/Downloads/otel-collector.yml
# Modified to send metrics to BOTH Prometheus and OpenSearch

receivers:
  # Host Metrics Receiver - collects system-level metrics
  hostmetrics:
    scrapers:
      cpu:
      disk:
      filesystem:
      load:
      memory:
      network:
      # Uncomment for process metrics
      #process:
      #  metrics:
      #    - process.cpu.time
      #    - process.memory.usage

  # Docker Stats Receiver - collects container metrics
  docker_stats:
    endpoint: /var/run/docker.sock
    container_annotations_to_labels:
      - key: "io.kubernetes.container.name"
        label: "k8s_container_name"
      - key: "io.kubernetes.pod.name"
        label: "k8s_pod_name"

  # OTLP receiver for traces, metrics, logs, and profiles
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318
        cors:
          allowed_origins:
            - "http://localhost:4070"
            - "http://localhost:3000"
            - "http://localhost:5173"
            - "*"
          allowed_headers:
            - "*"
          max_age: 7200

processors:
  batch:

  # Resource Detection Processor - detects and adds resource attributes
  resourcedetection/env:
    detectors: [env, system]
    timeout: 2s
    override: false

  # Additional Resource Detection (can be enabled for more detection)
  #resourcedetection/cloud:
  #  detectors: [ec2, gce, azure]
  #  timeout: 5s
  #  override: false

  # Memory Limiter - prevents OOM
  memory_limiter:
    check_interval: 1s
    limit_mib: 512
    spike_limit_mib: 128

  filter/exclude_otel_exports:
    traces:
      span:
        - 'attributes["url.full"] != nil and IsMatch(attributes["url.full"], ".*opentelemetry.proto.collector.*")'

  # Resource Processor - add custom resource attributes
  resource/add_cluster:
    attributes:
      - key: cluster.name
        value: "monitoring-stack"
        action: upsert
      - key: deployment.environment
        value: "production"
        action: upsert

exporters:
  # ========== PROMETHEUS EXPORTERS ==========

  # Prometheus Remote Write - send metrics to Prometheus
  prometheusremotewrite:
    endpoint: http://prometheus:9090/api/v1/write
    tls:
      insecure: true
    resource_to_telemetry_conversion:
      enabled: true
    retry_on_failure:
      enabled: true
      initial_interval: 5s
      max_interval: 30s
      max_elapsed_time: 300s
    send_queue_size: 10000
    send_queue_shard_count: 10
    # Add external labels
    external_labels:
      cluster: "monitoring-stack"

  # Prometheus Exporter - expose metrics for scraping
  prometheus:
    endpoint: "0.0.0.0:8889"
    namespace: otel_collector
    const_labels:
      cluster: "monitoring-stack"
    resource_to_telemetry_conversion:
      enabled: true

  # ========== OPENSEARCH EXPORTERS ==========

  # Data Prepper Exporter (Metrics) - send to Data Prepper for OpenSearch
  otlp/metrics:
    endpoint: data-prepper:21891
    tls:
      insecure: true

  # OpenSearch Direct Exporter - send metrics directly to OpenSearch
  opensearch/metrics:
    http:
      endpoint: http://opensearch:9200
      tls:
        insecure: true
    index: otel_metrics
    action:
      name: index
    batch:
      size: 1000
      timeout: 10s
    retry:
      enabled: true
      max_retries: 5
    compression: gzip

  # ========== TRACE EXPORTERS ==========

  # Data Prepper Exporter (Traces)
  otlp/prepper:
    endpoint: data-prepper:21890
    tls:
      insecure: true
      insecure_skip_verify: true

  # OpenSearch Exporter (Traces)
  opensearch/traces:
    http:
      endpoint: http://opensearch:9200
      tls:
        insecure: true
    index: jaeger-spans
    batch:
      size: 500
      timeout: 5s

  # Jaeger Exporter
  otlp/jaeger:
    endpoint: jaeger:4317
    tls:
      insecure: true

  # ========== LOG EXPORTERS ==========

  opensearch/logs:
    http:
      endpoint: http://opensearch:9200
      tls:
        insecure: true
    index: otel_logs
    batch:
      size: 500
      timeout: 5s

  # ========== PROFILE EXPORTERS ==========

  file/json:
    path: /tmp/profiles.json
    format: json

  otlp/pyroscope:
    endpoint: "http://pyroscope:4040"
    tls:
      insecure: true

  # ========== DEBUG EXPORTER ==========

  debug:
    verbosity: normal
    sampling_initial: 10
    sampling_thereafter: 100

service:
  telemetry:
    resource:
      service.name: otel-collector
      service.version: 0.131.0
      service.instance.id: ${env:HOSTNAME}
    logs:
      level: info
    metrics:
      level: detailed
      readers:
        - pull:
            exporter:
              prometheus:
                host: 0.0.0.0
                port: 8888

  # Extensions
  extensions:
    - health_check
    - pprof
    - zpages

  # Pipelines
  pipelines:
    # ========== TRACE PIPELINE ==========
    traces:
      receivers: [otlp]
      processors: [batch, resourcedetection/env, filter/exclude_otel_exports]
      exporters:
        - otlp/prepper      # To Data Prepper → OpenSearch
        - opensearch/traces # Direct to OpenSearch
        - otlp/jaeger      # To Jaeger (if using)

    # ========== METRICS PIPELINE (Application + Host) ==========
    metrics:
      receivers: [hostmetrics, docker_stats, otlp]
      processors: [batch, memory_limiter, resourcedetection/env, resource/add_cluster]
      exporters:
        - prometheusremotewrite  # To Prometheus (Remote Write)
        - prometheus             # To Prometheus (Scraping)
        - otlp/metrics           # To Data Prepper → OpenSearch
        - opensearch/metrics     # Direct to OpenSearch

    # ========== PROFILES PIPELINE ==========
    profiles:
      receivers: [otlp]
      exporters: [file/json, otlp/pyroscope]

    # ========== LOGS PIPELINE ==========
    logs:
      receivers: [otlp]
      processors: [batch, resourcedetection/env]
      exporters:
        - opensearch/logs

# ========== EXTENSIONS ==========
extensions:
  health_check:
    endpoint: 0.0.0.0:13133
    path: /health
    state:
      port: 13133
  pprof:
    endpoint: 0.0.0.0:1777
  zpages:
    endpoint: 0.0.0.0:55679
