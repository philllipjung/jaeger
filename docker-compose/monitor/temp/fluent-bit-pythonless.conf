# Fluent Bit Configuration for Java Profiling - NO PYTHON
# Uses only Fluent Bit built-in parsers

[SERVICE]
    Flush         10
    Daemon        Off
    Log_Level     debug

# ========== INPUT: Java Profiling (async-profiler collapsed format) ==========
[INPUT]
    Name              tail
    Path              /var/log/otel-collector/profiles-java/profiles.jsonl
    Tag               java_profiles
    Parser            json
    Refresh_Interval  10
    Skip_Long_Lines   Off
    DB                /tmp/profiles-java.db
    Mem_Buf_Limit     100MB

# ========== FILTER: Add metadata ==========
[FILTER]
    Name                modify
    Match               *
    # Add service name if not present
    Add                 service    server1
    Add                 profiler   async-profiler
    Add                 timestamp  ${unix_timestamp}

# ========== OUTPUT: Stack Traces to OpenSearch ==========
[OUTPUT]
    Name              opensearch
    Match              java_profiles
    Host              opensearch
    Port              9200
    Index             java-stack-traces
    Trace_Output      On
    Trace_Error       On
    Suppress_Type_Name On
    Log_Level         info
    # Time-based index for better organization
    # IndexName       java-stack-traces-${%Y.%m.%d}
